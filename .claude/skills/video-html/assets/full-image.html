<!--
TEMPLATE: Full Image
DESCRIPTION: Full-canvas AI-generated image, no text overlay. Used for every scene in Mode C.
USE WHEN: Mode C (AI-Generated Images) — the image fills the entire frame.
PLACEHOLDERS:
  - IMAGE: Replace the <div class="image-placeholder"> with:
           <img src="YOUR_PATH_OR_BASE64" alt="YOUR_ALT_TEXT" class="image">
           Always generate with --aspect-ratio 16:9.
CONSTRAINTS:
  - Do not modify the boilerplate <style> or <script> blocks.
  - Do not add headings, captions, or overlaid text — the image is the entire slide.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Full Image</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600&family=Figtree:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Boilerplate: do not modify ── */
    :root {
      font-size: calc(16vh / 9); /* 1rem = 16px at design height of 900px; scales with viewport */
      --color-teal:           #0093A4;
      --color-purple:         #8C52BA;
      --color-aqua:           #3CFFF7; /* AI features only */
      --color-error:          #E02D16;
      --color-warning:        #F9CB28;
      --color-success:        #3EA33E;
      --color-info:           #1892E3;
      --color-text-primary:   #292F36;
      --color-text-secondary: #4C5661;
      --color-gray-light:     #F7F8FA;
      --color-gray-medium:    #D1D4D8;
      --color-gray-dark:      #5F6872;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Figtree', sans-serif;
      background: var(--color-gray-light);
      color: var(--color-text-primary);
    }
    /* ── End boilerplate ── */

    /* Shown when no image is provided — replace with <img class="image"> */
    .image-placeholder {
      width: 100%;
      height: 100%;
      background: var(--color-gray-medium);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: 0.125rem;
      color: var(--color-gray-dark);
      text-transform: uppercase;
    }

    /* Applied to <img> after replacing the placeholder */
    .image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: fadeIn 0.4s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- IMAGE: Replace this div with <img src="YOUR_PATH_OR_BASE64" alt="YOUR_ALT_TEXT" class="image"> -->
  <div class="image-placeholder">Image Placeholder</div>

</body>
</html>
